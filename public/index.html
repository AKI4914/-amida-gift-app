<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>あみだくじ</title>
<style>
  :root{
    --paper: #F6F1E4;
    --paper-deep: #EFE6D2;
    --ink: #2B2620;
    --ink-soft: #6b5f4f;
    --gold: #B8860B;
    --gold-light: #D9A94E;
    --gold-bright: #E8C468;
    --vermillion: #C0392B;
    --line: #4b3b2a;
    --shadow: rgba(43,38,32,0.18);
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--paper);
    color: var(--ink);
    font-family: "Shippori Mincho","Noto Serif JP", serif;
    -webkit-tap-highlight-color: transparent;
    overflow-x:hidden;
  }
  body{
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184,134,11,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(192,57,43,0.05), transparent 40%);
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 28px 16px 40px;
  }

  .eyebrow{
    font-size: 12px;
    letter-spacing: 0.35em;
    color: var(--gold);
    margin-bottom: 6px;
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: 600;
  }
  h1{
    font-size: 26px;
    margin: 0 0 4px;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .sub{
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 28px;
    text-align:center;
    line-height:1.7;
  }

  /* ---- スタート画面(1・2・3を選ぶ) ---- */
  #startScreen{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    max-width: 480px;
  }
  .plaques{
    display:flex;
    gap: 18px;
    justify-content:center;
    width:100%;
    margin-top: 12px;
  }
  .plaque{
    flex:1;
    max-width: 120px;
    aspect-ratio: 3/4;
    border: none;
    border-radius: 10px;
    background: linear-gradient(160deg, var(--gold-bright), var(--gold) 65%, #8f680a);
    box-shadow: 0 6px 14px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.35);
    color: #3a2a08;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-family: "Shippori Mincho", serif;
    cursor:pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .plaque:active{ transform: scale(0.94); }
  .plaque .kanji{ font-size: 34px; line-height:1; }
  .plaque .num{
    font-family: system-ui, sans-serif;
    font-size: 12px;
    opacity:0.75;
    letter-spacing: 0.1em;
  }
  .plaque:disabled{ opacity:0.4; pointer-events:none; }

  /* ---- くじ画面 ---- */
  #ladderScreen{
    display:none;
    width:100%;
    max-width: 480px;
    flex-direction:column;
    align-items:center;
  }
  #ladderScreen.active{ display:flex; }
  #startScreen.hidden{ display:none; }

  .ladder-wrap{
    position:relative;
    width:100%;
    max-width: 340px;
    margin: 6px auto 10px;
  }
  svg#ladderSvg{ width:100%; height:auto; display:block; }

  .col-label-top, .col-label-bottom{
    font-family: system-ui, sans-serif;
    font-size: 14px;
    font-weight:700;
    fill: var(--ink-soft);
  }
  .lantern-glow{
    filter: drop-shadow(0 0 0px var(--gold-bright));
    transition: filter .4s ease;
  }
  .lantern-glow.lit{
    filter: drop-shadow(0 0 10px var(--gold-bright));
  }

  #status{
    margin-top: 18px;
    min-height: 24px;
    text-align:center;
    font-size: 14px;
    color: var(--ink);
    line-height:1.8;
    padding: 0 6px;
  }

  .sparkle{
    position:absolute;
    pointer-events:none;
    border-radius:50%;
    background: var(--gold-bright);
    opacity:0;
  }

  @keyframes fallFade{
    0%{ transform: translateY(0) scale(1); opacity:1; }
    100%{ transform: translateY(60px) scale(0.3); opacity:0; }
  }

  audio{ display:none; }

  @media (prefers-reduced-motion: reduce){
    .lantern-glow, .plaque{ transition:none; }
  }
</style>
</head>
<body>

  <div class="eyebrow">AMIDA LOTTERY</div>
  <h1>あみだくじ</h1>
  <p class="sub">番号をひとつお選びください。<br>糸をたどった先に、ご縁の印がございます。</p>

  <!-- スタート画面 -->
  <div id="startScreen">
    <div class="plaques">
      <button class="plaque" data-start="1"><span class="kanji">一</span><span class="num">1</span></button>
      <button class="plaque" data-start="2"><span class="kanji">二</span><span class="num">2</span></button>
      <button class="plaque" data-start="3"><span class="kanji">三</span><span class="num">3</span></button>
    </div>
  </div>

  <!-- くじ画面 -->
  <div id="ladderScreen">
    <div class="ladder-wrap">
      <svg id="ladderSvg" viewBox="0 0 600 960" preserveAspectRatio="xMidYMid meet">
        <!-- 縦線(はしご) -->
        <line x1="100" y1="60" x2="100" y2="850" stroke="var(--line)" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
        <line x1="300" y1="60" x2="300" y2="850" stroke="var(--line)" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
        <line x1="500" y1="60" x2="500" y2="850" stroke="var(--line)" stroke-width="6" stroke-linecap="round" opacity="0.35"/>

        <!-- 横線(rung) 5本 -->
        <line x1="100" y1="180" x2="300" y2="180" stroke="var(--line)" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
        <line x1="300" y1="320" x2="500" y2="320" stroke="var(--line)" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
        <line x1="100" y1="460" x2="300" y2="460" stroke="var(--line)" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
        <line x1="300" y1="600" x2="500" y2="600" stroke="var(--line)" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
        <line x1="100" y1="740" x2="300" y2="740" stroke="var(--line)" stroke-width="6" stroke-linecap="round" opacity="0.35"/>

        <!-- 上部ラベル 1/2/3 -->
        <text x="100" y="40" text-anchor="middle" class="col-label-top">1</text>
        <text x="300" y="40" text-anchor="middle" class="col-label-top">2</text>
        <text x="500" y="40" text-anchor="middle" class="col-label-top">3</text>

        <!-- 下部 行灯(A/B/C) -->
        <g id="lanternA" class="lantern-glow">
          <rect x="70" y="860" width="60" height="60" rx="10" fill="#fff8e8" stroke="var(--gold)" stroke-width="3"/>
          <text x="100" y="902" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="26" fill="var(--vermillion)">A</text>
        </g>
        <g id="lanternB" class="lantern-glow">
          <rect x="270" y="860" width="60" height="60" rx="10" fill="#fff8e8" stroke="var(--gold)" stroke-width="3"/>
          <text x="300" y="902" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="26" fill="var(--vermillion)">B</text>
        </g>
        <g id="lanternC" class="lantern-glow">
          <rect x="470" y="860" width="60" height="60" rx="10" fill="#fff8e8" stroke="var(--gold)" stroke-width="3"/>
          <text x="500" y="902" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="26" fill="var(--vermillion)">C</text>
        </g>

        <!-- なぞる光の糸(JSで描画) -->
        <polyline id="tracePath" fill="none" stroke="url(#goldGrad)" stroke-width="10"
                  stroke-linecap="round" stroke-linejoin="round"/>
        <circle id="traceDot" r="14" fill="var(--gold-bright)" style="filter:drop-shadow(0 0 8px var(--gold-bright));" visibility="hidden"/>

        <defs>
          <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#E8C468"/>
            <stop offset="100%" stop-color="#C0392B"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div id="status"></div>
  </div>

  <!-- BGM: 既存の音声ファイルのパスに合わせてください(元のindex.htmlのsrcをそのまま流用) -->
  <audio id="bgm" src="/public/sutra-audio.mp3" loop preload="auto"></audio>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  const LIFF_ID = '2010602853-ZzPMLlwD';

  // ------------------------------------------------------------------
  // あみだくじの経路定義(スタート位置 → 通る座標 → 到達tier)
  // どの番号を選んでも到達先は異なるが、賞品はすべて同額(10,000円)
  // ------------------------------------------------------------------
  const ROUTES = {
    1: { tier: 'A', points: [[100,60],[100,180],[300,180],[300,320],[500,320],[500,600],[300,600],[300,740],[100,740],[100,850]] },
    2: { tier: 'C', points: [[300,60],[300,180],[100,180],[100,460],[300,460],[300,600],[500,600],[500,850]] },
    3: { tier: 'B', points: [[500,60],[500,320],[300,320],[300,460],[100,460],[100,740],[300,740],[300,850]] },
  };

  const startScreen = document.getElementById('startScreen');
  const ladderScreen = document.getElementById('ladderScreen');
  const statusEl = document.getElementById('status');
  const bgm = document.getElementById('bgm');
  const tracePath = document.getElementById('tracePath');
  const traceDot = document.getElementById('traceDot');
  const plaqueBtns = document.querySelectorAll('.plaque');

  let liffReady = false;

  // ---- あみだくじ演出 ----
  function playLadder(startNum){
    const route = ROUTES[startNum];
    if (!route) return;

    plaqueBtns.forEach(b => b.disabled = true);

    // 音楽再生(楽しげなBGM)
    try { bgm.currentTime = 0; bgm.play().catch(()=>{}); } catch(e) {}

    startScreen.classList.add('hidden');
    ladderScreen.classList.add('active');
    statusEl.textContent = 'ご縁をお結びしています…';

    const ptsStr = route.points.map(p => p.join(',')).join(' ');
    tracePath.setAttribute('points', ptsStr);

    // stroke-dasharrayを使って線を少しずつ描く(なぞるアニメーション)
    const totalLength = tracePath.getTotalLength();
    tracePath.style.transition = 'none';
    tracePath.style.strokeDasharray = totalLength;
    tracePath.style.strokeDashoffset = totalLength;
    // 強制リフロー
    tracePath.getBoundingClientRect();
    tracePath.style.transition = `stroke-dashoffset 4.2s cubic-bezier(.4,0,.2,1)`;
    tracePath.style.strokeDashoffset = 0;

    traceDot.setAttribute('visibility', 'visible');
    const startTime = performance.now();
    const duration = 4200;
    function moveDot(now){
      const t = Math.min(1, (now - startTime) / duration);
      const len = t * totalLength;
      const pt = tracePath.getPointAtLength(len);
      traceDot.setAttribute('cx', pt.x);
      traceDot.setAttribute('cy', pt.y);
      if (t < 1) requestAnimationFrame(moveDot);
    }
    requestAnimationFrame(moveDot);

    setTimeout(() => onLadderFinished(route.tier), duration + 150);
  }

  function onLadderFinished(tier){
    const lantern = document.getElementById('lantern' + tier);
    if (lantern) lantern.classList.add('lit');
    spawnSparkles(lantern);
    statusEl.textContent = 'ご縁の印が灯りました🏮 ギフトをお届けしています…';
    grantGift(tier);
  }

  function spawnSparkles(lanternGroup){
    if (!lanternGroup) return;
    const bbox = lanternGroup.getBoundingClientRect();
    const wrap = document.querySelector('.ladder-wrap');
    const wrapBox = wrap.getBoundingClientRect();
    for (let i=0; i<14; i++){
      const s = document.createElement('div');
      s.className = 'sparkle';
      const size = 4 + Math.random()*6;
      s.style.width = size+'px';
      s.style.height = size+'px';
      s.style.left = (bbox.left - wrapBox.left + bbox.width/2 + (Math.random()-0.5)*50) + 'px';
      s.style.top = (bbox.top - wrapBox.top + (Math.random()-0.5)*20) + 'px';
      s.style.animation = `fallFade ${0.8 + Math.random()*0.6}s ease-out forwards`;
      s.style.animationDelay = (Math.random()*0.3) + 's';
      wrap.appendChild(s);
      setTimeout(()=> s.remove(), 1800);
    }
  }

  // ---- サーバーへギフト付与をリクエスト ----
  // ★重要: '/api/checkpoint' の部分は、server.js内の実際のエンドポイント名(app.postの1つ目の引数)に
  //         合わせて書き換えてください。( '/webhook' 以外のもう一つの app.post が該当します)
  async function grantGift(tier){
    try {
      const idToken = liff.getIDToken();
      const res = await fetch('/api/checkpoint', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, tier })
      });
      const data = await res.json();
      if (res.ok) {
        statusEl.textContent = data.alreadyGranted
          ? 'このギフトは付与済みです。'
          : '🎁 LINEにギフトコードを送信しました!トークをご確認ください。';
      } else if (data.error === 'out_of_stock') {
        statusEl.textContent = '申し訳ございません、ただいまギフト在庫切れです。運営にお問い合わせください。';
      } else {
        statusEl.textContent = 'エラーが発生しました。時間をおいて再度お試しください。';
      }
    } catch (e) {
      statusEl.textContent = '通信エラーが発生しました。';
    }
  }

  plaqueBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const n = btn.getAttribute('data-start');
      if (!liffReady) {
        statusEl.textContent = '準備中です。少しお待ちください。';
        return;
      }
      playLadder(n);
    });
  });

  // ---- LIFF初期化 ----
  (async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      liffReady = true;
    } catch (e) {
      statusEl.textContent = 'LIFF初期化エラー: ' + e.message;
    }
  })();
</script>
</body>
</html>
