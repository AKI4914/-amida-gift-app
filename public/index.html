  }
   { background: #ccc; }
  #status { text-align: center; font-size: 13px; color: #666; margin-top: 8px; }
</style>
</head>
<body>

<h1>仏説阿弥陀経</h1>
<div id="progressWrap"><div id="progressBar"></div></div>
<div id="sutra"></div>

<div id="controls">
  <button id="playBtn">🎵 読経を再生</button>
  <button id="nextBtn">次へなぞる</button>
</div>
<div id="status"></div>

<audio id="bgm" src="/public/sutra-audio.mp3" loop></audio>

<script>
// ---------------------------------------------------------
// 1) 経文をチェックポイント付きで区切る
//    ※実際の全文に差し替えてください。ここではデモ用の抜粋構成です。
// ---------------------------------------------------------
const SEGMENTS = [
  { text: "如是我聞。一時佛在舎衛国祇樹給孤独園。與大比丘僧千二百五十人倶。", checkpoint: null },
  { text: "皆是大阿羅漢。衆所知識。長老舎利弗。摩訶目犍連。摩訶迦葉。摩訶迦栴延。", checkpoint: null },
  { text: "爾時佛告長老舎利弗。従是西方過十万億佛土。有世界名曰極楽。其土有佛。号阿弥陀。今現在説法。",
    checkpoint: "A" }, // ← ここまで読むと商品A(3,000円)
  { text: "舎利弗。彼土何故名為極楽。其国衆生。無有衆苦。但受諸楽。故名極楽。", checkpoint: null },
  { text: "又舎利弗。極楽国土。七重欄楯。七重羅網。七重行樹。皆是四宝周匝囲繞。是故彼国名曰極楽。",
    checkpoint: "B" }, // ← ここまで読むと商品B(5,000円)
  { text: "舎利弗。汝勿謂此鳥実是罪報所生。所以者何。彼佛国土無三悪趣。", checkpoint: null },
  { text: "舎利弗。若有善男子善女人。聞説阿弥陀佛。執持名号。一心不乱。是人終時。心不顛倒。即得往生阿弥陀佛極楽国土。",
    checkpoint: "C" }, // ← ここまで読むと商品C(10,000円)
];

const sutraEl = document.getElementById('sutra');
const progressBar = document.getElementById('progressBar');
const statusEl = document.getElementById('status');
const nextBtn = document.getElementById('nextBtn');
const playBtn = document.getElementById('playBtn');
const bgm = document.getElementById('bgm');

let current = -1;

function render() {
  sutraEl.innerHTML = SEGMENTS.map((s, i) => {
    const cls = i < current ? 'done' : (i === current ? 'current' : '');
    return `<span class="segment ${cls}" id="seg-${i}">${s.text}</span>`;
  }).join('');
  progressBar.style.width = `${Math.max(0, ((current + 1) / SEGMENTS.length) * 100)}%`;
  const target = document.getElementById(`seg-${current}`);
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

playBtn.addEventListener('click', () => {
  bgm.play();
  playBtn.textContent = '🎵 再生中';
  playBtn.disabled = true;
});

nextBtn.addEventListener('click', async () => {
  if (current >= SEGMENTS.length - 1) return;
  current++;
  render();

  const seg = SEGMENTS[current];
  if (seg.checkpoint) {
    nextBtn.disabled = true;
    statusEl.textContent = 'ギフトを確認しています…';
    try {
      const idToken = liff.getIDToken();
      const res = await fetch('/api/checkpoint', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, tier: seg.checkpoint }),
      });
      const data = await res.json();
      if (res.ok) {
        statusEl.textContent = data.alreadyGranted
          ? 'このギフトは付与済みです。'
          : '🎁 LINEにギフトコードを送信しました！トークをご確認ください。';
      } else if (data.error === 'out_of_stock') {
        statusEl.textContent = '申し訳ございません、ただいまギフト在庫切れです。運営にお問い合わせください。';
      } else {
        statusEl.textContent = 'エラーが発生しました。時間をおいて再度お試しください。';
      }
    } catch (e) {
      statusEl.textContent = '通信エラーが発生しました。';
    } finally {
      nextBtn.disabled = false;
    }
  } else {
    statusEl.textContent = '';
  }

  if (current === SEGMENTS.length - 1) {
    nextBtn.textContent = '読誦完了';
    nextBtn.disabled = true;
  }
});

// ---------------------------------------------------------
// LIFF初期化
// ---------------------------------------------------------
(async () => {
  try {
    await liff.init({ liffId: '2010602853-ZzPMLlwD' });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    render();
  } catch (e) {
    statusEl.textContent = 'LIFF初期化エラー: ' + e.message;
  }
})();
</script>
</body>
</html>
